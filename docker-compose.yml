version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lphenom-db-app:latest
    container_name: lphenom_db_app
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: lphenom
      DB_USER: lphenom
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379

  mysql:
    image: mysql:8.0.36
    container_name: lphenom_db_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: lphenom
      MYSQL_USER: lphenom
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "lphenom", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2.4-alpine
    container_name: lphenom_db_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

